<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Contact Form</title>
    <meta name="description"
        content="Reach out easily with our contact form. Send inquiries, feedback, or support messages. Fast, secure, and simple to use.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="og:title" content="Destiny's Contact Form">
    <meta property="og:type" content="website">
    <meta property="og:image"
        content="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse3.mm.bing.net%2Fth%2Fid%2FOIP._Ph8V2iImjMO09vtZ09PgAHaHk%3Fpid%3DApi&f=1&ipt=9a93df5a46699dfa42ab9b60a4c8d3df56c5d97bd8fc93bcc6e265f2c19165ba&ipo=images">
    <meta property="og:image:alt" content="HTML icon">
    <meta property="og:url" content="https://destiny2938.github.io/Contact-Form/">
</head>

<body>
    <header>
        <h1>Acme Support</h1>
        <nav>
            <a href="/" target="_blank" rel="noopener noreferrer">Home</a><a href="/" target="_blank"
                rel="noopener noreferrer">Help</a><a href="/" target="_blank" rel="noopener noreferrer">Contact</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Contact Us</h2>
            <form action="/" method="post">
                <fieldset>
                    <legend>Send us a message and we will get back to you.</legend>
                    <label for="customer-name">Full Name </label>
                    <input type="text" name="customer-name" id="customer-name" placeholder="John Doe" required>
                    <label for="customer-email">Email </label>
                    <input type="email" name="customer-email" id="customer-email" required
                        placeholder="example@email.com">
                    <label for="customer-subject">Subject </label>
                    <select name="customer-subject" id="customer-subject">
                        <option value="">Choose a Topic</option>
                        <option value="as">As</option>
                        <option value="ab">Ab</option>
                        <option value="ag">Ag</option>
                    </select>
                    <label for="customer-message">Message </label>
                    <textarea name="customer-message" id="customer-message" required minlength="8"></textarea>
                </fieldset>
                <fieldset>
                    <legend>How did you hear about us?</legend>
                    <input type="radio" name="customer-recommendation" id="customer-search-recommendation">
                    <label for="customer-search-recommendation">Search</label>
                    <input type="radio" name="customer-recommendation" id="customer-friend-recommendation">
                    <label for="customer-friend-recommendation">Friend</label>
                    <input type="radio" name="customer-recommendation" id="customer-social-media-recommendation">
                    <label for="customer-social-media-recommendation">Social Media</label>
                </fieldset>
                <input type="checkbox" name="customer-newsletter" id="customer-newsletter">
                <label for="customer-newsletter">Send me product updates</label>
                <button type="submit">Send Messages</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&#169; 2026 Acme Support</p>
    </footer>
</body>

</html>
